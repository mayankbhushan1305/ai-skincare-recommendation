<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowAI - Personalized Skincare Recommendations</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2rem;
            font-weight: 300;
            opacity: 0.9;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            position: relative;
            overflow: hidden;
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ff9a9e, #fecfef, #fecfef, #ff9a9e);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .form-group {
            margin-bottom: 30px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            color: #555;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        .select-wrapper {
            position: relative;
        }

        select {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid #e8e8e8;
            border-radius: 20px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            background: white;
            transition: all 0.3s ease;
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 16px center;
            background-repeat: no-repeat;
            background-size: 18px;
            padding-right: 50px;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .submit-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .result-section {
            margin-top: 40px;
            padding: 30px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 25px;
            color: white;
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-section h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .result-section p {
            font-size: 1.1rem;
            line-height: 1.7;
            background: rgba(255,255,255,0.2);
            padding: 25px;
            border-radius: 20px;
            border-left: 5px solid rgba(255,255,255,0.5);
        }

        .skin-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .skin-icon {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 20px;
            transition: all 0.3s ease;
            cursor: default;
        }

        .skin-icon:hover {
            transform: scale(1.05);
            background: rgba(255,255,255,0.3);
        }

        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .shape {
            position: absolute;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .shape:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 120px;
            height: 120px;
            top: 60%;
            right: 10%;
            animation-delay: 2s;
        }

        .shape:nth-child(3) {
            width: 60px;
            height: 60px;
            bottom: 20%;
            left: 20%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.2rem;
            }
            
            .form-container {
                padding: 30px 20px;
                margin: 20px;
            }
            
            .skin-icons {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-spa"></i> Glow Sense</h1>
            <p>Your Personalized Skincare Advisor</p>
        </div>

        <div class="form-container">
            <div class="skin-icons">
                <div class="skin-icon">
                    <i class="fas fa-droplet" style="font-size: 2rem; color: #667eea;"></i>
                    <div>Hydration</div>
                </div>
                <div class="skin-icon">
                    <i class="fas fa-shield-alt" style="font-size: 2rem; color: #f5576c;"></i>
                    <div>Protection</div>
                </div>
                <div class="skin-icon">
                    <i class="fas fa-gem" style="font-size: 2rem; color: #ff9a9e;"></i>
                    <div>Glow</div>
                </div>
            </div>

            <form method="POST">
                <div class="form-group">
                    <label><i class="fas fa-layer-group"></i> Skin Type</label>
                    <div class="select-wrapper">
                        <select name="skin_type" required>
                            <option value="" disabled selected>Choose your skin type</option>
                            <option value="oily">🫒 Oily</option>
                            <option value="dry">🌵 Dry</option>
                            <option value="sensitive">🌸 Sensitive</option>
                            <option value="combination">⚖️ Combination</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-exclamation-triangle"></i> Main Concern</label>
                    <div class="select-wrapper">
                        <select name="concern" required>
                            <option value="" disabled selected>What bothers you most?</option>
                            <option value="acne">🦠 Acne</option>
                            <option value="pigmentation">☀️ Pigmentation</option>
                            <option value="aging">⌛ Aging</option>
                            <option value="dullness">💡 Dullness</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fas fa-magic"></i> Get My Glow Routine
                </button>
            </form>

            {% if recommendation %}
                <div class="result-section">
                    <h2><i class="fas fa-award"></i> Your Perfect Routine</h2>
                    <p>{{ recommendation|safe }}</p>
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
